name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oase_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: mysql://root:root@localhost:3306/oase_test
      JWT_SECRET: github-ci-jwt-secret-min-16-chars
      JWT_REFRESH_SECRET: github-ci-refresh-secret-min-16-chars
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      ENCRYPTION_KEY: github-ci-enc-key-min-16

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
          cache: npm
          cache-dependency-path: oase-api/package-lock.json

      - name: Install dependencies
        working-directory: oase-api
        run: npm ci

      - name: Prisma generate
        working-directory: oase-api
        run: npx prisma generate

      - name: Prisma validate
        working-directory: oase-api
        run: npx prisma validate

      - name: Wait for MySQL
        run: sleep 15

      - name: MySQL diagnostic
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot -e "SHOW DATABASES; USE oase_test; SHOW TABLES;"

      - name: Prisma migrate status
        working-directory: oase-api
        run: npx prisma migrate status || true

      - name: Run migrations
        working-directory: oase-api
        run: npx prisma migrate deploy

      - name: MySQL post-migration diagnostic
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot -e "USE oase_test; SHOW TABLES;"

      - name: Seed test data
        working-directory: oase-api
        run: npm run seed

      - name: Lint
        working-directory: oase-api
        run: npm run lint:check

      - name: Build
        working-directory: oase-api
        run: npm run build

      - name: Unit tests
        working-directory: oase-api
        run: npm test

      - name: E2E tests (Jest)
        working-directory: oase-api
        run: npm run test:e2e

      - name: Install Playwright browsers
        working-directory: oase-api
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        working-directory: oase-api
        run: |
          npm run start:dev > playwright-server.log 2>&1 &
          sleep 15
          npx playwright test
          pkill -f "nest start"

      - name: Integrity test
        working-directory: oase-api
        run: npm run integration:test
