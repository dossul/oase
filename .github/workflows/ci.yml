name: CI - Tests

# Test runner - ne fait pas de deploiement
# Le deploiement se fait manuellement via deploy-from-windows.bat
# Voir docs/GUIDE_DEPLOY_WINDOWS.md

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oase_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: mysql://root:root@localhost:3306/oase_test
      JWT_SECRET: github-ci-jwt-secret-min-16-chars
      JWT_REFRESH_SECRET: github-ci-refresh-secret-min-16-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oase-api/package-lock.json

      - name: Install dependencies
        working-directory: oase-api
        run: npm ci

      - name: Prisma generate
        working-directory: oase-api
        run: npx prisma generate

      - name: Lint
        working-directory: oase-api
        run: npm run lint:check

      - name: Build
        working-directory: oase-api
        run: npm run build
