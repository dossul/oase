name: CD - Build & Deploy

# Declenche sur push main apres merge
on:
  push:
    branches: [main]
    paths:
      - 'oase-api/**'
      - 'maquette/**'
      - 'deploy/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deployer apres build ?'
        required: false
        default: 'true'

concurrency:
  group: deploy-oase
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dossul

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Nettoyer le cache Docker avant pour eliminer tout cache stale
      - name: Clean Docker cache
        run: |
          docker system prune -af || true
          docker builder prune -af || true

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push oase-api
        run: |
          docker build \
            --no-cache \
            --pull \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-api:latest \
            --file deploy/api.Dockerfile \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-api:latest

      - name: Build & push oase-frontend
        run: |
          docker build \
            --no-cache \
            --pull \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-frontend:latest \
            --file deploy/frontend.Dockerfile \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-frontend:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    environment:
      name: production
      url: https://oase.ulia.site

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/oase
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            for i in $(seq 1 45); do
              if docker compose -f docker-compose.prod.yml exec -T oase-db mysqladmin ping -h localhost >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done
            docker compose -f docker-compose.prod.yml exec -T oase-api npx prisma migrate deploy
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
          command_timeout: 10m

      - name: Smoke test
        run: |
          sleep 10
          curl -fsS --max-time 10 https://api.oase.ulia.site/api/v1/health || echo "WARN: API pas encore prete"
          echo ""
          curl -fsSI --max-time 10 https://oase.ulia.site/ | head -3
