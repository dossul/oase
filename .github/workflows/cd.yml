name: CD - Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'oase-api/**'
      - 'maquette/**'
      - 'deploy/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: deploy-oase
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dossul

jobs:
  build-and-deploy:
    name: Build & deploy on VPS
    runs-on: ubuntu-22.04
    environment:
      name: production
      url: https://oase.ulia.site
    permissions:
      contents: read
      packages: write

    steps:
      # Etape 1 : test SSH minimal
      - name: Debug - print secrets status
        run: |
          echo "VPS_HOST: $VPS_HOST (len=${#VPS_HOST})"
          echo "VPS_USER: $VPS_USER (len=${#VPS_USER})"
          echo "VPS_SSH_KEY: <hidden> (len=${#VPS_SSH_KEY})"
          echo "==> Key content (first/last 3 lines):"
          echo "$VPS_SSH_KEY" | head -3
          echo "---"
          echo "$VPS_SSH_KEY" | tail -3
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      # Etape 2 : SSH test
      - name: SSH test
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY" > ~/.ssh/id_test
          echo "" >> ~/.ssh/id_test  # newline final
          chmod 600 ~/.ssh/id_test
          echo "==> Key file size: $(wc -c < ~/.ssh/id_test) bytes"
          echo "==> First 30 chars: $(head -c 30 ~/.ssh/id_test)"
          echo "==> Trying SSH..."
          ssh -vvv -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/id_test $VPS_USER@$VPS_HOST 'echo SSH_WORKS; uptime' 2>&1 | tail -40
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
