name: CD - Build & Deploy

# Declenche sur push main apres merge
# Strategie : on pull le code et on build DIRECTEMENT sur le VPS.
on:
  push:
    branches: [main]
    paths:
      - 'oase-api/**'
      - 'maquette/**'
      - 'deploy/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: deploy-oase
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dossul

jobs:
  build-and-deploy:
    name: Build & deploy on VPS
    runs-on: ubuntu-22.04
    environment:
      name: production
      url: https://oase.ulia.site
    permissions:
      contents: read
      packages: write

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY" > ~/.ssh/id_test
          echo "" >> ~/.ssh/id_test
          chmod 600 ~/.ssh/id_test
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Build & deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.actor }}
        run: |
          cat > /tmp/deploy.sh <<'SCRIPT'
          #!/bin/bash
          set -e
          echo "==> 1. Pull du code"
          cd /opt/oase
          if [ ! -d .git ]; then
            git clone https://github.com/dossul/oase.git .
          else
            git fetch origin
            git reset --hard origin/main
          fi

          echo "==> 2. Login GHCR"
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GH_USER" --password-stdin

          echo "==> 3. Build oase-api"
          docker build \
            --no-cache \
            --tag ghcr.io/dossul/oase-api:latest \
            --tag oase-api:latest \
            --file deploy/api.Dockerfile \
            .

          echo "==> 4. Build oase-frontend"
          docker build \
            --no-cache \
            --tag ghcr.io/dossul/oase-frontend:latest \
            --tag oase-frontend:latest \
            --file deploy/frontend.Dockerfile \
            .

          echo "==> 5. Push vers GHCR"
          docker push ghcr.io/dossul/oase-api:latest
          docker push ghcr.io/dossul/oase-frontend:latest

          echo "==> 6. Restart stack (images locales)"
          docker compose -f deploy/docker-compose.local-prod.yml up -d --force-recreate

          echo "==> 7. Attente MySQL (max 60s)"
          for i in $(seq 1 30); do
            if docker exec oase-db mysqladmin ping -h localhost >/dev/null 2>&1; then
              echo "MySQL OK"
              break
            fi
            sleep 2
          done

          echo "==> 8. Migrations Prisma"
          docker exec oase-api npx prisma migrate deploy

          echo "==> 9. Nettoyage"
          docker image prune -f

          echo "==> 10. Statut final"
          docker ps --format 'table {{.Names}}\t{{.Status}}' | grep oase
          echo "==> OK deploy termine"
          SCRIPT
          chmod +x /tmp/deploy.sh
          scp -i ~/.ssh/id_test -o StrictHostKeyChecking=no /tmp/deploy.sh "$VPS_USER@$VPS_HOST:/tmp/deploy.sh"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" "GITHUB_TOKEN='$GITHUB_TOKEN' GH_USER='$GH_USER' bash /tmp/deploy.sh"

      - name: Smoke test
        run: |
          echo "==> Test API health"
          sleep 15
          curl -fsS --max-time 10 https://api.oase.ulia.site/api/v1/health || echo "WARN: API pas encore prete"
          echo ""
          echo "==> Test frontend"
          curl -fsSI --max-time 10 https://oase.ulia.site/ | head -3
