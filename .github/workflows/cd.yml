name: CD - Build & Deploy

# Declenche sur push main apres merge
# Strategie : on pull le code et on build DIRECTEMENT sur le VPS.
on:
  push:
    branches: [main]
    paths:
      - 'oase-api/**'
      - 'maquette/**'
      - 'deploy/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: deploy-oase
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dossul

jobs:
  build-and-deploy:
    name: Build & deploy on VPS
    runs-on: ubuntu-22.04
    environment:
      name: production
      url: https://oase.ulia.site
    permissions:
      contents: read
      packages: write

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY" > ~/.ssh/id_test
          echo "" >> ~/.ssh/id_test
          chmod 600 ~/.ssh/id_test
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Build & deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.actor }}
        run: |
          echo "==> Test 1: SSH simple"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" 'echo SSH_OK; hostname; pwd'

          echo "==> Test 2: git pull"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" 'cd /opt/oase && git fetch origin && git reset --hard origin/main 2>&1 | tail -5'

          echo "==> Test 3: docker build API"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" 'cd /opt/oase && docker build --no-cache -t oase-api:latest -f deploy/api.Dockerfile . 2>&1 | tail -5'

          echo "==> Test 4: docker build frontend"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" 'cd /opt/oase && docker build --no-cache -t oase-frontend:latest -f deploy/frontend.Dockerfile . 2>&1 | tail -5'

          echo "==> Test 5: restart stack"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" 'cd /opt/oase && docker compose -f deploy/docker-compose.local-prod.yml up -d --force-recreate 2>&1 | tail -10'

          echo "==> Test 6: mysql wait + migrate"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" 'for i in $(seq 1 30); do docker exec oase-db mysqladmin ping -h localhost >/dev/null 2>&1 && break; sleep 2; done && docker exec oase-api npx prisma migrate deploy 2>&1 | tail -5'

          echo "==> Test 7: status"
          ssh -i ~/.ssh/id_test -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" 'docker ps --format "table {{.Names}}\t{{.Status}}" | grep oase'

          echo "==> TOUT OK"

      - name: Smoke test
        run: |
          echo "==> Test API health"
          sleep 15
          curl -fsS --max-time 10 https://api.oase.ulia.site/api/v1/health || echo "WARN: API pas encore prete"
          echo ""
          echo "==> Test frontend"
          curl -fsSI --max-time 10 https://oase.ulia.site/ | head -3
