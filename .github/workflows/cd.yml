name: CD - Build & Deploy

# Declenche sur push main apres merge
# Strategie : on pull le code et on build DIRECTEMENT sur le VPS.
# Plus fiable que de builder dans GitHub Actions (runner ephemere
# qui pose probleme avec buildkit cache).
on:
  push:
    branches: [main]
    paths:
      - 'oase-api/**'
      - 'maquette/**'
      - 'deploy/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: deploy-oase
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dossul

jobs:
  # ============================================================
  # BUILD + PUSH sur le VPS directement
  # ============================================================
  build-and-deploy:
    name: Build & deploy on VPS
    runs-on: ubuntu-22.04
    environment:
      name: production
      url: https://oase.ulia.site
    permissions:
      contents: read
      packages: write

    steps:
      - name: Deploy via SSH (build on VPS)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          debug: true
          script: |
            set -e

            echo "==> 1. Pull du code"
            cd /opt/oase
            # Si pas de repo git sur le VPS, on utilise git clone
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin
              git reset --hard origin/main
            fi

            echo "==> 2. Login GHCR (depuis le VPS)"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            echo "==> 3. Build oase-api"
            docker build \
              --no-cache \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-api:latest \
              --tag oase-api:latest \
              --file deploy/api.Dockerfile \
              .

            echo "==> 4. Build oase-frontend"
            docker build \
              --no-cache \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-frontend:latest \
              --tag oase-frontend:latest \
              --file deploy/frontend.Dockerfile \
              .

            echo "==> 5. Push vers GHCR"
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-api:latest
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/oase-frontend:latest

            echo "==> 6. Pull + restart stack (compose prod utilise les images GHCR)"
            cd /opt/oase
            docker compose -f deploy/docker-compose.prod.yml pull || true
            docker compose -f deploy/docker-compose.local-prod.yml up -d --force-recreate

            echo "==> 7. Attente MySQL (max 60s)"
            for i in $(seq 1 30); do
              if docker exec oase-db mysqladmin ping -h localhost >/dev/null 2>&1; then
                echo "MySQL OK"
                break
              fi
              sleep 2
            done

            echo "==> 8. Migrations Prisma"
            docker exec oase-api npx prisma migrate deploy

            echo "==> 9. Nettoyage"
            docker image prune -f

            echo "==> 10. Statut final"
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep oase

            echo "==> OK deploy termine"
          command_timeout: 20m

      - name: Smoke test
        run: |
          echo "==> Test API health"
          sleep 15
          curl -fsS --max-time 10 https://api.oase.ulia.site/api/v1/health || echo "WARN: API pas encore prete"
          echo ""
          echo "==> Test frontend"
          curl -fsSI --max-time 10 https://oase.ulia.site/ | head -3
