# Compose dev (utilise le source local)
# Usage (depuis la racine du repo) :
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Acces :
#   - Frontend : http://localhost:8080
#   - API      : http://localhost:3000/api/v1
#   - MySQL    : localhost:3306 (root/root)

services:
  oase-db:
    image: mysql:8.0
    container_name: oase-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: oase
      MYSQL_USER: oase
      MYSQL_PASSWORD: oase
    volumes:
      - oase_db_data_dev:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  oase-api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    container_name: oase-api-dev
    restart: unless-stopped
    depends_on:
      oase-db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: mysql://oase:oase@oase-db:3306/oase?charset=utf8mb4
      JWT_SECRET: dev-jwt-secret-not-for-prod-min-16
      JWT_REFRESH_SECRET: dev-refresh-secret-not-for-prod-min-16
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      LOG_LEVEL: debug
    ports:
      - "3000:3000"

  oase-frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    container_name: oase-frontend-dev
    restart: unless-stopped
    depends_on:
      - oase-api
    ports:
      - "8080:80"

volumes:
  oase_db_data_dev:
